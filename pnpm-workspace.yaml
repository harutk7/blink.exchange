packages:
  - 'apis/*'
  - 'apps/*'
  - 'config/*'
  - 'packages/*'
  - 'packages/stellar/contract-bindings/*'

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - sushi

overrides:
  graphql: 16.6.0
  abitype: "catalog:web3"
  typescript: "catalog:"
  utf-8-validate: "catalog:"
  viem: "catalog:web3"
  zod: "catalog:"
  '@types/react': "catalog:react"
  '@types/react-dom': "catalog:react"
  '@solana/addresses': "catalog:web3"

patchedDependencies:
  '@aptos-labs/aptos-client@0.1.0': patches/@aptos-labs__aptos-client@0.1.0.patch
  '@msafe/aptos-wallet-adapter@1.1.3': patches/@msafe__aptos-wallet-adapter@1.1.3.patch
  '@walletconnect/logger@2.1.2': patches/@walletconnect__logger@2.1.2.patch
  '@walletconnect/jsonrpc-http-connection@1.0.8': patches/@walletconnect__jsonrpc-http-connection@1.0.8.patch
  '@solana/connector': patches/@solana__connector.patch

onlyBuiltDependencies:
  - '@biomejs/biome'
  - '@reown/appkit'
  - '@stellar/stellar-sdk'
  - sharp
  - esbuild
  - bufferutil
  - utf-8-validate

catalog:
  "typescript": 5.8.3
  "utf-8-validate": 6.0.3
  "zod": 4.1.11

catalogs:
  web3:
    "abitype": 1.2.3
    "wagmi": 3.3.2
    "@wagmi/core": 3.2.2
    "viem": 2.44.4
    "@solana/addresses": 6.0.1
    "sushi": 6.6.11

  react:
    "next": 16.2.6
    "react": 19.2.4
    "@types/react": 19.2.14
    "react-dom": 19.2.4
    "@types/react-dom": 19.2.3
  
  ui:
    "tailwindcss": 3.3.2

  tsconfig:
    "@tsconfig/next": 2.0.1
    "@tsconfig/node20": 20.1.4
    "@tsconfig/strictest": 2.0.2
